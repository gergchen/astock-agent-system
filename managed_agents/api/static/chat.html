<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股交易助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a1b1e; color: #e1e1e3; }
  .header { padding: 12px 16px; background: #25262b; border-bottom: 1px solid #373a40; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .header .status { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; display: inline-block; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #4a6cf7; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #2c2e33; color: #e1e1e3; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: #25262b; color: #888; font-size: 12px; padding: 4px 12px; border-radius: 4px; }
  .msg .time { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  .input-area { padding: 12px 16px; background: #25262b; border-top: 1px solid #373a40; display: flex; gap: 8px; flex-shrink: 0; }
  .input-area textarea { flex: 1; background: #1a1b1e; border: 1px solid #373a40; border-radius: 8px; padding: 10px 14px; color: #e1e1e3; font-size: 14px; resize: none; outline: none; font-family: inherit; max-height: 120px; }
  .input-area textarea:focus { border-color: #4a6cf7; }
  .input-area button { background: #4a6cf7; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .input-area button:hover { background: #5a7cf7; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #555; border-top-color: #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <span class="status"></span>
  A股交易助手
</div>
<div class="messages" id="messages">
  <div class="msg system">已连接 — 你可以问我股票行情、分析、交易建议等</div>
</div>
<div class="input-area">
  <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  const loadingId = 'loading-' + Date.now();
  addLoading(loadingId);

  try {
    const resp = await fetch('/api/v1/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await resp.json();
    removeLoading(loadingId);
    addMessage(data.reply || '(空回复)', 'assistant');
  } catch (err) {
    removeLoading(loadingId);
    addMessage('连接失败: ' + err.message, 'system');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = text + '<div class="time">' + ts + '</div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addLoading(id) {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = id;
  div.innerHTML = '<div class="loading"></div> 思考中...';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeLoading(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.focus();
</script>
</body>
</html>
