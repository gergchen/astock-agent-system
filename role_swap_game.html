<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角色互换 — 一日体验</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  padding: 20px;
}
.game-container {
  max-width: 600px;
  width: 100%;
  background: rgba(255,255,255,0.05);
  border-radius: 24px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  min-height: 500px;
  display: flex;
  flex-direction: column;
}
.header {
  text-align: center;
  margin-bottom: 24px;
}
.header h1 {
  color: #e8d5b7;
  font-size: 1.5em;
  letter-spacing: 4px;
  font-weight: 300;
}
.header .subtitle {
  color: rgba(232,213,183,0.5);
  font-size: 0.85em;
  margin-top: 4px;
}
.scene {
  flex: 1;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.scene-text {
  color: #f0e6d3;
  font-size: 1.05em;
  line-height: 1.8;
  padding: 16px 0;
  min-height: 120px;
  white-space: pre-wrap;
}
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 16px;
}
.choice-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(232,213,183,0.2);
  color: #e8d5b7;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 0.95em;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: left;
  font-family: inherit;
}
.choice-btn:hover {
  background: rgba(232,213,183,0.12);
  border-color: rgba(232,213,183,0.5);
  transform: translateX(4px);
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn.highlight {
  background: rgba(232,213,183,0.15);
  border-color: #e8d5b7;
}
.progress-bar {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 20px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  transition: all 0.4s;
}
.dot.active { background: #e8d5b7; box-shadow: 0 0 8px rgba(232,213,183,0.4); }
.dot.passed { background: rgba(232,213,183,0.3); }
.footer {
  text-align: center;
  margin-top: 20px;
  color: rgba(255,255,255,0.2);
  font-size: 0.75em;
}
.restart-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(232,213,183,0.4);
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85em;
  font-family: inherit;
  transition: all 0.3s;
  margin-top: 12px;
}
.restart-btn:hover {
  border-color: rgba(232,213,183,0.3);
  color: rgba(232,213,183,0.7);
}
.fade-in { animation: fadeIn 0.5s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.status-bar {
  display: flex;
  justify-content: space-between;
  padding: 8px 4px 16px;
  color: rgba(232,213,183,0.4);
  font-size: 0.8em;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 8px;
}
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <h1>✦ 角色互换 ✦</h1>
    <div class="subtitle">一日体验 · 选择你的故事</div>
  </div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="status-bar">
    <span id="sceneLabel">第 1 幕</span>
    <span id="endingLabel"></span>
  </div>
  <div class="scene" id="scene">
    <div class="scene-text fade-in" id="sceneText"></div>
    <div class="choices" id="choices"></div>
  </div>
  <div class="footer">
    <button class="restart-btn" id="restartBtn" style="display:none">重新开始</button>
  </div>
</div>

function render() {
  const scene = game.scenes[game.currentScene];
  document.getElementById('sceneLabel').textContent = scene.label || '';
  document.getElementById('sceneText').innerHTML = scene.text.replace(/\n/g, '<br>');

  const container = document.getElementById('choices');
  container.innerHTML = '';
  scene.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.addEventListener('click', () => goTo(c.next));
    container.appendChild(btn);
    setTimeout(() => btn.classList.add('fade-in'), i * 100);
  });

  updateProgress();
  document.getElementById('restartBtn').style.display =
    scene.choices.length === 0 ? 'inline-block' : 'none';
}

function goTo(sceneId) {
  if (!game.scenes[sceneId]) return;
  game.history.push(game.currentScene);
  game.currentScene = sceneId;
  render();
}

function updateProgress() {
  const total = Object.keys(game.scenes).length;
  const visited = game.history.length + 1;
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  for (let i = 0; i < Math.min(total, 8); i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i < game.history.length) dot.classList.add('passed');
    if (i === game.history.length) dot.classList.add('active');
    bar.appendChild(dot);
  }
}

document.getElementById('restartBtn').addEventListener('click', () => {
  game.currentScene = 'start';
  game.history = [];
  render();
});

render();
</script>
</body>
</html>
